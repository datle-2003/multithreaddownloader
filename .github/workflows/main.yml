name: Java CI/CD with GraalVM

on:
  push:
    branches: ["main"]
    tags:
      - 'v*'
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run Tests
        run: ./gradlew test

  build-native:
    name: Build on ${{ matrix.os }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Grant execute permission for gradlew
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build Native Image
        run: ./gradlew nativeCompile

      - name: Rename Linux
        if: runner.os == 'Linux'
        run: mv build/native/nativeCompile/downloader build/native/nativeCompile/downloader-linux

      - name: Rename macOS
        if: runner.os == 'macOS'
        run: mv build/native/nativeCompile/downloader build/native/nativeCompile/downloader-macos

      - name: Rename Windows
        if: runner.os == 'Windows'
        run: mv build/native/nativeCompile/downloader.exe build/native/nativeCompile/downloader-windows.exe

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}
          path: build/native/nativeCompile/downloader-*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build-native
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true 

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            downloader-linux
            downloader-windows.exe
            downloader-macos
          generate_release_notes: true
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
