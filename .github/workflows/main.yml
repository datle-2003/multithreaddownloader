name: Java CI/CD with GraalVM

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: 

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin' 
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Run Tests
        run: ./gradlew test

  build-native:
    name: Build Native on ${{ matrix.os }}
    needs: test 
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Grant execute permission for gradlew
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build Native Image
        run: ./gradlew nativeCompile

      - name: Rename Binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mv build/native/nativeCompile/downloader build/native/nativeCompile/downloader-${{ runner.os }}

      - name: Rename Binary (Windows)
        if: runner.os == 'Windows'
        run: |
          mv build/native/nativeCompile/downloader.exe build/native/nativeCompile/downloader-windows.exe

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: downloader-${{ matrix.os }}
          path: build/native/nativeCompile/downloader-*